
<h2 class="sr-only">Universal unit converter — 14 categories, 120+ units, instant bidirectional conversion</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:.75rem 0}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.cb{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:12px;color:var(--color-text-secondary);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.cb:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.cb.on{background:var(--color-background-info);border-color:var(--color-border-info);color:var(--color-text-info);font-weight:500}
.cb i{font-size:14px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:20px;margin-bottom:10px}
.conv{display:grid;grid-template-columns:1fr 44px 1fr;gap:12px;align-items:start}
.plbl{display:block;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--color-text-secondary);margin-bottom:8px}
.ni{width:100%;font-size:28px;font-weight:500;font-family:var(--font-mono,monospace);border:none;outline:none;background:transparent;color:var(--color-text-primary);padding:0;margin-bottom:10px;-moz-appearance:textfield}
.ni::-webkit-outer-spin-button,.ni::-webkit-inner-spin-button{-webkit-appearance:none}
.ni:focus{color:var(--color-text-info)}
.nr{font-size:28px;font-weight:500;font-family:var(--font-mono,monospace);color:var(--color-text-info);margin-bottom:10px;word-break:break-all;min-height:38px;line-height:1.2}
.us{width:100%;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:7px 10px;background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer;font-family:inherit}
.swapc{display:flex;align-items:flex-start;justify-content:center;padding-top:28px}
.swb{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--color-text-secondary);transition:all .15s;flex-shrink:0}
.swb:hover{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.swb i{font-size:18px}
.fml{text-align:center;font-size:12px;font-family:var(--font-mono,monospace);color:var(--color-text-tertiary);margin-bottom:14px;min-height:18px}
.ah{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--color-text-secondary);margin-bottom:10px}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px}
.uc{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;cursor:pointer;transition:border-color .15s}

.uc.on{border-color:var(--color-border-info);background:var(--color-background-info)}
.uc.on .cv{color:var(--color-text-info)}
.cv{font-size:14px;font-weight:500;font-family:var(--font-mono,monospace);color:var(--color-text-primary);margin-bottom:3px;word-break:break-all;line-height:1.3}

<div class="card">

    <div>
      <span class="plbl">From</span>
      <input type="number" class="ni" id="fv" value="1" placeholder="0" aria-label="Value to convert">
      <select class="us" id="fu" aria-label="From unit"></select>
    </div>
    <div class="swapc">
      <button class="swb" id="sw" aria-label="Swap units">

    </div>
    <div>

      <div class="nr" id="tv" aria-live="polite">—</div>
      <select class="us" id="tu" aria-label="To unit"></select>
    </div>
  </div>
</div>
<div class="fml" id="fml"></div>
<div class="ah">All conversions — click any to set as target</div>

</div>

function tC(v,id){
  switch(id){
    case 'c': return v;
    case 'f': return(v-32)*5/9;
    case 'k': return v-273.15;
    case 'r': return(v-491.67)*5/9;
    case 'de':return 100-v*2/3;
    case 're':return v*5/4;
    case 'ro':return(v-7.5)*40/21;
    case 'ne':return v*100/33;
    default: return v;
  }
}
function fC(c,id){
  switch(id){
    case 'c': return c;
    case 'f': return c*9/5+32;
    case 'k': return c+273.15;
    case 'r': return(c+273.15)*9/5;
    case 'de':return(100-c)*3/2;
    case 're':return c*4/5;
    case 'ro':return c*21/40+7.5;
    case 'ne':return c*33/100;
    default: return c;
  }
}
function toL100(v,id){
  if(v===0)return Infinity;
  switch(id){
    case 'l100':return v;
    case 'mpgus':return 235.215/v;
    case 'mpguk':return 282.481/v;
    case 'kml':return 100/v;
    case 'mpl':return 62.137/v;
    case 'kmgus':return 100/(v/3.78541);
    default: return v;
  }
}
function fL100(l,id){
  if(l===0||!isFinite(l))return id==='l100'?0:Infinity;
  switch(id){
    case 'l100':return l;
    case 'mpgus':return 235.215/l;
    case 'mpguk':return 282.481/l;
    case 'kml':return 100/l;
    case 'mpl':return 62.137/l;
    case 'kmgus':return 100/l*3.78541;
    default: return l;
  }
}
function conv(v,cat,fid,tid){
  if(cat.sp==='temp'){return fC(tC(v,fid),tid);}
  if(cat.sp==='fuel'){return fL100(toL100(v,fid),tid);}
  const fu=cat.u.find(u=>u.id===fid);
  const tu=cat.u.find(u=>u.id===tid);
  if(!fu||!tu)return 0;
  return v*fu.f/tu.f;
}
function fmt(n){
  if(n===null||n===undefined||isNaN(n)||!isFinite(n))return '—';
  const a=Math.abs(n);
  if(a===0)return '0';
  if(a>=1e15||a<1e-9)return n.toExponential(5);
  if(a>=1e12)return(n/1e12).toPrecision(7).replace(/\.?0+$/,'')+'T';
  if(a>=1e9)return(n/1e9).toPrecision(7).replace(/\.?0+$/,'')+'B';
  if(a>=10000)return parseFloat(n.toPrecision(8)).toLocaleString('en-IN');
  if(a>=1)return parseFloat(n.toPrecision(8))+'';
  return parseFloat(n.toPrecision(6))+'';
}

let ci=0;
const catsEl=document.getElementById('cats');
const fvEl=document.getElementById('fv');
const tvEl=document.getElementById('tv');
const fuEl=document.getElementById('fu');
const tuEl=document.getElementById('tu');
const agEl=document.getElementById('ag');
const fmlEl=document.getElementById('fml');

function mkCats(){
  catsEl.innerHTML='';
  D.forEach((cat,i)=>{
    const b=document.createElement('button');
    b.className='cb'+(i===ci?' on':'');
    b.innerHTML=`<i class="ti ${cat.ic}" aria-hidden="true"></i>${cat.n}`;
    b.onclick=()=>{ci=i;buildAll();};
    catsEl.appendChild(b);
  });
}
function mkSels(){
  const cat=D[ci];
  [fuEl,tuEl].forEach(s=>{s.innerHTML='';cat.u.forEach(u=>{const o=document.createElement('option');o.value=u.id;o.textContent=`${u.n} (${u.s})`;s.appendChild(o);});});
  fuEl.selectedIndex=0;
  tuEl.selectedIndex=Math.min(1,cat.u.length-1);
}
function mkGrid(){
  const cat=D[ci];
  const v=parseFloat(fvEl.value)||0;
  const fid=fuEl.value,tid=tuEl.value;
  agEl.innerHTML='';
  cat.u.forEach(u=>{
    const r=conv(v,cat,fid,u.id);
    const c=document.createElement('div');
    c.className='uc'+(u.id===tid?' on':'');
    c.innerHTML=`<div class="cv">${fmt(r)}</div><div class="cn">${u.n}&nbsp;<span class="cs">${u.s}</span></div>`;
    c.onclick=()=>{tuEl.value=u.id;update();};
    agEl.appendChild(c);
  });
}
function update(){
  const cat=D[ci];
  const v=parseFloat(fvEl.value);
  const fid=fuEl.value,tid=tuEl.value;
  if(isNaN(v)){tvEl.textContent='—';mkGrid();return;}
  const r=conv(v,cat,fid,tid);
  tvEl.textContent=fmt(r);
  if(!cat.sp){
    const fu=cat.u.find(u=>u.id===fid);
    const tu=cat.u.find(u=>u.id===tid);
    if(fu&&tu)fmlEl.textContent=`1 ${fu.s} = ${fmt(fu.f/tu.f)} ${tu.s}`;
  } else {
    fmlEl.textContent='';
  }
  mkGrid();
}
function buildAll(){mkCats();mkSels();update();}

fvEl.addEventListener('input',update);
fuEl.addEventListener('change',update);
tuEl.addEventListener('change',update);
document.getElementById('sw').addEventListener('click',()=>{
  const oid=fuEl.value,nid=tuEl.value;
  const ov=parseFloat(fvEl.value)||0;
  const res=conv(ov,D[ci],oid,nid);
  fuEl.value=nid;tuEl.value=oid;
  fvEl.value=isFinite(res)?parseFloat(res.toPrecision(10))+'':'1';
  update();
});

buildAll();
